  <style>
  * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.profile-card {
  display: flex;
  align-items: center;
  background-color: #ffffff;
  padding: 16px 24px;
  border-radius: 4px; 
  width: 100%;
  max-width: 450px; 
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); 
  margin: 20px auto; 
}

.avatar-container {
  margin-right: 16px; 
}

.avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
  background-color: #4db6ac; 
}

.profile-info {
  flex-grow: 1; 
}

.username {
  font-size: 18px;
  font-weight: 700;
  color: #1a1a1a;
  line-height: 1.2;
  margin-bottom: 2px;
}

.subtitle {
  font-size: 16px;
  color: #888888;
  line-height: 1.2;
}

.status {
  font-size: 14px;
  color: #b0b0b0;
  margin-top: 4px;
}

.action-container {
  margin-left: 16px;
}

.follow-btn {
  background-color: #3b97f5; 
  color: white;
  border: none;
  padding: 10px 24px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 6px;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

.follow-btn:hover {
  background-color: #2a85e4;
}

  </style>
</head>
