<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soal 10c keyla</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #181818;
    font-family: 'Roboto', Arial, sans-serif;
    padding: 16px;
    display: flex;
    justify-content: center;
  }
  .list {
    width: 360px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .item {
    display: flex;
    gap: 8px;
    cursor: pointer;
  }
  .thumb {
    width: 168px;
    height: 94px;
    border-radius: 8px;
    flex-shrink: 0;
    object-fit: cover;
  }
  .meta {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    color: #f1f1f1;
    min-width: 0;
  }
  .title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
    color: #f1f1f1;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .channel {
    font-size: 12px;
    color: #aaaaaa;
  }
  .views {
    font-size: 12px;
    color: #aaaaaa;
  }
</style>
</head>
<body>

<div class="list">

  <div class="item">
    <img class="thumb" src="gambar1.png" alt="How to compete against CS degrees">
    <div class="meta">
      <div class="title">How to compete against CS degrees (as a self-taught dev)</div>
      <div class="channel">SuperSimpleDev</div>
      <div class="views">1.5K views &middot; 4 months ago</div>
    </div>
  </div>

  <div class="item">
    <img class="thumb" src="gambar2.png" alt="Which programming language to learn first">
    <div class="meta">
      <div class="title">Which programming language to learn first 2022 (with charts)</div>
      <div class="channel">SuperSimpleDev</div>
      <div class="views">5.7K views &middot; 11 months ago</div>
    </div>
  </div>

  <div class="item">
    <img class="thumb" src="gambar3.png" alt="Frontend web development overview">
    <div class="meta">
      <div class="title">Frontend web development - a complete overview (2021)</div>
      <div class="channel">SuperSimpleDev</div>
      <div class="views">1K views &middot; 4 months ago</div>
    </div>
  </div>

</div>

</body>
</html>
