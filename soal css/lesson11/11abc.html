  * {
    margin: 0;

  body {

  .grid-container {
    display: grid;

  }
 
  .grid-11b .item3 {
    background-color: #add8e6; 
  }
 
  .grid-11c {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    column-gap: 20px;
    row-gap: 10px;
  }
 
  .grid-11c .grid-item {
    background-color: #f4c2c2; 
  }

}
