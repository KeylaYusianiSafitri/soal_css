<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soal 12e-f-g Keyla</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #fff;
      color: #111;
      padding: 32px 24px;
      max-width: 900px;
      margin: 0 auto;
    }



    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 36px 48px;
    }

    .section-label {
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #111;
    }

    .notif-list {
      border: 1.5px solid #ccc;
      border-radius: 6px;
      overflow: hidden;
      width: 100%;
      max-width: 280px;
    }

    .notif-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      border-bottom: 1px solid #e0e0e0;
      font-size: 0.88rem;
    }

    .notif-item:last-child {
      border-bottom: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
    }

    .badge-dark  { background: #1e88e5; }
    .badge-blue  { background: #1e88e5; }
    .badge-green { background:#1e88e5; }

    .search-bar-wrap {
      display: flex;
      align-items: stretch;
      width: 100%;
      max-width: 560px;
      height: 42px;
      border-radius: 5px;
      overflow: hidden;
      border: 2px solid #6a1b9a;
    }

    .search-tab {
      background: #6a1b9a;
      color: #fff;
      padding: 0 22px;
      font-size: 0.88rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.01em;
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      background: #fff;
      padding: 0 14px;
      font-size: 0.88rem;
      color: #333;
    }

    .search-input::placeholder {
      color: #bbb;
    }

    .search-btn {
      background: #6a1b9a;
      color: #fff;
      border: none;
      border-left: 2px solid #6a1b9a;
      padding: 0 22px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.02em;
      transition: background 0.18s;
    }

    .search-btn:hover {
      background: #4a148c;
    }

    .follow-card {
      background: #ffffff;
      border-radius: 10px;
      padding: 16px 18px;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .follow-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .follow-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      background: #444;
    }

    .follow-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .follow-info {
      flex: 1;
      min-width: 0;
    }

    .follow-name {
      color: #000000;
      font-weight: 700;
      font-size: 0.88rem;
    }

    .follow-sub {
      color: #9ca3af;
      font-size: 0.76rem;
      margin-top: 1px;
      line-height: 1.4;
    }

    .follow-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 18px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.18s;
    }

    .follow-btn:hover {
      background: #1d4ed8;
    }

    .full-col {
      grid-column: 1 / -1;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .full-col { grid-column: 1; }
    }
  </style>
</head>
<body>


  <div class="grid">

    <!-- 12e -->
    <div>
      <p class="section-label">12e. </p>
      <div class="notif-list">
        <div class="notif-item">
          <span>Home</span>
          <span class="badge badge-dark">14</span>
        </div>
        <div class="notif-item">
          <span>Notifications</span>
          <span class="badge badge-blue">3</span>
        </div>
        <div class="notif-item">
          <span>Messages</span>
          <span class="badge badge-green">5</span>
        </div>
      </div>
    </div>

    <!-- 12g -->
    <div>
      <p class="section-label">12g. </p>
      <div class="follow-card">

        <div class="follow-item">
          <div class="follow-avatar">
            <img src="kelinci.jpg" alt="oliver">
          </div>
          <div class="follow-info">
            <div class="follow-name">oliver</div>
            <div class="follow-sub">the cat<br>Popular</div>
          </div>
          <button class="follow-btn">Follow</button>
        </div>

        <div class="follow-item">
          <div class="follow-avatar">
            <img src="kucing.png" alt="Mimi">
          </div>
          <div class="follow-info">
            <div class="follow-name">Mimi</div>
            <div class="follow-sub">Sleepy Cat<br>Popular</div>
          </div>
          <button class="follow-btn">Follow</button>
        </div>

        <div class="follow-item">
          <div class="follow-avatar">
            <img src="mort.jpeg" alt="Rex">
          </div>
          <div class="follow-info">
            <div class="follow-name">Rex</div>
            <div class="follow-sub">Happy Bulldog<br>Popular</div>
          </div>
          <button class="follow-btn">Follow</button>
        </div>

      </div>
    </div>

    <!-- 12f -->
    <div class="full-col">
      <p class="section-label">12f. </p>
      <div class="search-bar-wrap">
        <div class="search-tab">Home</div>
        <input class="search-input" type="text" placeholder="Search" />
        <button class="search-btn">Download</button>
      </div>
    </div>

  </div>

</body>
</html>
