<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>soal 14d keyla</title>
  <style>

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      height: 3000px; 
      background-color: #f0f0f0;
      padding: 20px;
    }

 
    .right-sidebar {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 100px;
      background-color: #1b4d3e;
      color: white;
      padding: 15px;
      font-size: 14px;
      z-index: 10;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: rgba(0, 0, 0, 0.8); 
      
      display: flex;
      justify-content: center;
      align-items: center;
      
      z-index: 100;
    }

    .modal-box {
      background-color: white;
      width: 100%;
      max-width: 400px;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    .modal-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #000000;
    }

    .modal-text {
      font-size: 16px;
      color: #333333;
      margin-bottom: 20px;
    }

    .close-button {
      padding: 6px 12px;
      font-size: 14px;
      background-color: #f0f0f0;
      border: 1px solid #767676;
      border-radius: 4px;
      cursor: pointer;
    }

    .close-button:hover {
      background-color: #e5e5e5;
    }
  </style>
</head>
<body>

  <div class="right-sidebar">right sidebar</div>

  <div class="modal-overlay">
    
    <div class="modal-box">
      <div class="modal-title">Modal Title</div>
      <p class="modal-text">This is a modal</p>
      <button class="close-button">Close</button>
    </div>

  </div>

</body>
</html>
