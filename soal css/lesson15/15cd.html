<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>soal 15c-d keyla</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 3000px;
      background-color: #f0f0f0;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    .video-ad-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 320px;
      height: 180px;
      background-color: #767676; 
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e0e0e0;
      font-size: 14px;
    }

    .close-button {
      position: absolute;
      top: -15px;
      left: -15px;
      
      width: 30px;
      height: 30px;
      background-color: black;
      color: white;
      border-radius: 50%;

      display: flex;
      justify-content: center;
      align-items: center;
      
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      user-select: none;
    }

    .timestamp {
      position: absolute;
      bottom: 8px; 
      right: 8px;  
      
      background-color: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 3px 6px;
      font-size: 12px;
      font-family: monospace;
      border-radius: 2px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>


  <div class="video-ad-container">
    
    <div class="close-button">X</div>

    <div class="timestamp">0:29</div>
  </div>

</body>
</html>
