<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>soal 15e-f keyla</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      min-height: 100vh;
      padding: 20px;
    }

    .product-card {
      position: relative;
      display: inline-block; 
      background-color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    /* Gambar Kemeja */
    .product-image {
      width: 300px;
      height: 300px;
      object-fit: cover;
      display: block;
    }

    .discount-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background-color: black;
      color: white;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .cart-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background-color: rgba(255, 255, 255, 0.75);
      
      display: flex;
      justify-content: center;
      align-items: center;
      
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .add-to-cart-btn {
      background-color: white;
      color: black;
      border: 1px solid black;
      padding: 8px 24px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .add-to-cart-btn:hover {
      background-color: black;
      color: white;
    }

    .product-card:hover .cart-overlay {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="product-card">
    <p>15e. </p>
    <img class="product-image" src="baju.png" alt="Clothing Product">
    
    <div class="discount-badge">20% OFF</div>
  </div>


  <div class="product-card">
    <p>15f. </p>
    <img class="product-image" src="baju.png" alt="Clothing Product">
    
    <div class="discount-badge">20% OFF</div>
    
    <div class="cart-overlay">
      <button class="add-to-cart-btn">Add to Cart</button>
    </div>
  </div>

</body>
</html>
