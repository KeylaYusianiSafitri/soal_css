<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>soal 16a-b-c keyla</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Roboto, Arial, sans-serif;
    }

    body {
      background-color: #f9f9f9;
      padding: 40px;
    }

    .header-icons-container {
      display: flex;
      gap: 20px;
      background-color: white;
      padding: 15px;
      border: 1px solid #e0e0e0;
      margin-bottom: 40px;
      width: fit-content;
    }

    .icon-wrapper {
      position: relative; 
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-placeholder {
      width: 24px;
      height: 24px;
      background-color: #606060;
      border-radius: 4px;
    }

    .tooltip {
      position: absolute;
      bottom: -35px;
      background-color: rgba(96, 96, 96, 0.9);
      color: white;
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 2px;
      white-space: nowrap;
      
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    .icon-wrapper:hover .tooltip {
      opacity: 1;
    }

    .video-card {
      width: 320px;
      background-color: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .thumbnail-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background-color: #e0e0e0;
    }

    .thumbnail-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-time {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background-color: black;
      color: white;
      font-size: 12px;
      padding: 2px 4px;
      border-radius: 2px;
      font-weight: 500;
    }

    .video-info-grid {
      display: flex;
      padding: 12px;
      gap: 12px;
    }

    .channel-pic-container {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .channel-pic {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .video-details {
      flex: 1;
    }

    .video-title-link {
      text-decoration: none;
      color: #0f0f0f;
    }

    .video-title-link:hover {
      text-decoration: underline;
    }

    .video-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .video-metadata {
      font-size: 12px;
      color: #606060;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="header-icons-container">
    <div class="icon-wrapper">
      <div class="icon-placeholder"></div>
      <div class="tooltip">Create</div>
    </div>
    <div class="icon-wrapper">
      <div class="icon-placeholder"></div>
      <div class="tooltip">YouTube apps</div>
    </div>
    <div class="icon-wrapper">
      <div class="icon-placeholder"></div>
      <div class="tooltip">Notifications</div>
    </div>
  </div>


  <div class="video-card">
    
    <a href="https://www.youtube.com/watch?v=ncq7V8SOfH0" target="_blank" class="thumbnail-container">
      <img class="thumbnail-img" src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=400" alt="Video Thumbnail">
      <div class="video-time">14:20</div>
    </a>

    <div class="video-info-grid">
      <a href="https://www.youtube.com/@mkbhd" target="_blank" class="channel-pic-container">
        <img class="channel-pic" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100" alt="Channel Avatar">
      </a>
      
      <div class="video-details">
        <a href="https://www.youtube.com/watch?v=ncq7V8SOfH0" target="_blank" class="video-title-link">
          <h3 class="video-title">Talking Tech and AI with Google CEO Sundar Pichai!</h3>
        </a>
        <div class="video-metadata">
          <p class="channel-name">Marques Brownlee</p>
          <p class="views-date">3.4M views &bull; 6 months ago</p>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
